<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ternary</title>
</head>
<body>
    <h1>Check the Console for Results</h1> 
    <p>Press <b>F12</b> and click the <b>Console</b> tab to see Task outputs.</p>
    <script>

        console.log("SECTION 6 – Ternary Operator (56–60)");

        // 1. If age >= 18 print "Adult" else "Minor"
        let age = 20;
        console.log(age >= 18 ? "Adult" : "Minor");
        // 2. If marks >= 50 print "Pass" else "Fail"
        let marks = 60;
        console.log(marks >= 50 ? "Pass" : "Fail");

        // 3. If number % 2 == 0 print "Even" else "Odd"
       let num1 = 9;
        console.log(num1 % 2 == 0 ? "Even" : "Odd");

        // 4. Nested ternary for grades
        let score = 85;
        console.log(score >= 90 ? "Grade A" : score >= 80 ? "Grade B" : score >= 70 ? "Grade C" : "Grade F");         

        // 5. Check number positive or negative using ternary
        let n = -5;
        n >= 0 ? console.log("positive") : console.log("negative");

    </script>
</body>
</html>
