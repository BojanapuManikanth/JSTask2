<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operators</title>
</head>

<body>
    <script>
        
        console.log("SECTION 1 – Basic Arithmetic (1–10)");
        

        // 1. Print addition, subtraction, multiplication, division of 25 and 4.
        console.log("Addition :", 25 + 4);
        console.log("Subtraction:", 25 - 4);
        console.log("Multiplication:", 25 * 4);
        console.log("Division:", 25 / 4);

        // 2. Print 100 % 30
        console.log(100 % 30);

        // 3.Print 7 ** 2
        console.log(7 ** 2);

        // 4. Print 2 ** 5
        console.log(2 ** 5);

        // 5. Store 50 in a variable and divide by 5
        let num = 50;
        console.log(num / 5);

        // 6. Find remainder of 45 divided by 6
        console.log(45 % 6);

        // 7. Multiply 0.5 * 8
        console.log(0.5 * 8);

        // 8. Subtract 200 from 75
        console.log(75 - 200);

        // 9. Add three numbers (10, 20, 30)
        console.log(10 + 20 + 30);

        // 10. Find 9 % 2
        console.log(9 % 2);

    </script>
</body>

</html>
