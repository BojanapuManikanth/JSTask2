1. Explain difference between == and ===
 == checks if values are same, but it changes the data type if needed.
=== checks if values and data types are exactly the same, no changes allowed.

2. Explain difference between a++ and ++a
a++ is post-increment.
It first uses the value of a, then increases it by 1.

++a is pre-increment.
It first increases the value of a by 1, then uses it.

3. List all falsy values.
   1.false
   2.0
   3.-0
   4."" (empty string)
   5.null
   6.undefined
   7.NaN

4. Explain why "5" - 2 works but "5" + 2 behaves differently
"5" - 2 works because - converts the string to a number automatically.
So "5" becomes 5, and the result is 3.

But "5" + 2 behaves differently because + can also mean string joining (concatenation).
So it joins them → "52" (not 7).

5. Explain why null == undefined is true
null == undefined is true because with == (loose equality), JavaScript treats null and undefined as equal.

But they are not exactly the same type, so null === undefined is false. -->
